name: Sync Blog

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'   # 매일 UTC 00:00 (한국시간 09:00)
  workflow_dispatch:        # 수동 실행

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Velog → D1 동기화
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.WORKER_URL }}/api/sync" \
            -H "Authorization: Bearer ${{ secrets.SYNC_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/response.json
          if [ "$STATUS" != "200" ]; then
            echo "동기화 실패: HTTP $STATUS"
            exit 1
          fi
